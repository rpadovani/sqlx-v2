name: Coverage

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Coverage Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: Run Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Go Test Coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: .test-coverage.yml
          git-token: ${{ secrets.GITHUB_TOKEN }}
          git-branch: badge # Or wherever you want to store badges
