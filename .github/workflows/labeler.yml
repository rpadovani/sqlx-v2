name: Labeler

on:
  workflow_run:
    workflows: ["Lint", "Tests", "Benchmarks", "Coverage"]
    types: [completed]

jobs:
  label-pr:
    name: Final Green Light
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Check Statuses
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflows = ["Lint", "Tests", "Benchmarks", "Coverage"];
            const prNumber = context.payload.workflow_run.pull_requests[0]?.number;
            
            if (!prNumber) {
              console.log("No PR found for this workflow run.");
              return;
            }

            // Get all workflow runs for this PR
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              event: 'pull_request',
              branch: context.payload.workflow_run.head_branch,
              per_page: 100
            });

            // Filter for the latest completed run of each required workflow
            const latestRuns = workflows.reduce((acc, name) => {
              const run = runs.data.workflow_runs
                .filter(r => r.name === name && r.status === 'completed')
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
              if (run) acc[name] = run.conclusion;
              return acc;
            }, {});

            const allGreen = workflows.every(name => latestRuns[name] === 'success');

            if (allGreen) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['ready-for-review']
              });
              console.log("All systems GREEN. Labeled PR as ready-for-review.");
            } else {
              console.log("Not all systems green yet:", latestRuns);
            }
